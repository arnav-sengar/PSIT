<!-- Some HTML tags are --

<a> - "anchor tags(used to create a hyperlink or link)
<abbr> - it defines an abbreviation for a phrase or longer word
<acronym> - it defines an acronym for a phrase or longer word
<address> - it defines the address of the author of a document or article
<applet> - it defines an embedded applet(not supported in HTML5)
<area> - it defines the area of an image map
<article> - it defines the self-contained content
<aside> - it defines the content aside from the main content.Mainly represented as a sidebar
<audio> - it is used to embed sound content in HTML documents
<b> - used to make a text bold
<base> - it defines the base URL for all the links in a document
<basefont> - it defines the base font for a document(not supported in HTML5)
<bdi> - this tag is used to provide isolation for that part of the text which may be formatted in different directions form its surrounding texts
<bdo> - used to overwrite the current textt directions
<big> - this tag is used to make font size one level larger than its surrounding content(not supported in HTML5)
<blockquote> - it is used to define a content which is taken from another source.
<body> - used to define the body section of an HTML document. -->
