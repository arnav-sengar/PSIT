<!-- The href attirbute specifies the location (URL) of the external resource(most often a style sheet file)

Syntax : <link href="style.css">

The required rel attirbute specifies the relationship between the current document and the linked document/resource.

Syntax : <link rel="stylesheet" href="style.css"> -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Hello World</h1>
    <h3>I am formatted with a linked style sheet</h3>
    <p>Me too!!!</p>
</body>
</html>
