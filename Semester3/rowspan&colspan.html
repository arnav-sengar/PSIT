<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    table,th,td{
        border: 2px solid blueviolet;
        border-collapse: collapse;
    }
    body{
      background-image: url("https://c7.alamy.com/comp/2D8PTP2/simple-geometric-repeating-pattern-with-black-and-white-squares-seamless-abstract-pattern-with-shapes-vector-illustration-2D8PTP2.jpg");
      background-size: 50%;
      background-color: black;
    }
</style>
</head>
<body>
    <h2>How to make a Table in HTML</h2>
    <p>To make a Cell span more than one column use the colspan attribute</p>

    <table style="width:100%;">
        <tr>
            <th colspan="2">Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Jill</td>
            <td>Smith</td>
            <td>43</td>
        </tr>
        <tr>
            <td>Armaan</td>
            <td>Bhoomika</td>
            <td>20</td>
        </tr>
    </table>
</body>
</html>
