<!-- Quotation and Citation elements

    <abbr> - Defines the abbreviation or acronym
    <address> - Defines the information for the author/owner of a document.
    <blockquote> - Defines a section that is quoted from another source.
    <bdo> - defines the text direction.
    <cite> - Defines the title of a work (e.g. a book, a movie
    <q> - defines a short inline quotation.
    
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>The <abbr title="Fabbrica Italiana Automobili Torino">FIAT</abbr> is an Automobile company</p>
    <p>Address: <address>123 Main St, Anytown, USA 12345</address>
        Phone: 123-456-7890</p>
    <p> Email: <a href="mailto:info@example.com">info@fiapl.com</a></p>
    
    <bdo dir="rtl">This line will be written form right to left</bdo>
    
</body>
</html>
